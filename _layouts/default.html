<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.author.name }}{% else %}{{ site.author.name }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  {% seo %}
  {% feed_meta %}
</head>
<body>
  <nav>
    <div class="container nav-inner">
      <a href="{{ '/' | relative_url }}" class="nav-brand">{{ site.author.name }}</a>
      <ul class="nav-links">
        <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Home</a></li>
        <li><a href="{{ '/blog' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a></li>
      </ul>
    </div>
  </nav>

  <main>{{ content }}</main>

  <footer>
    <div class="container footer-inner">
      <span>© {{ 'now' | date: '%Y' }} {{ site.author.name }}</span>
      <span>Jekyll · GitHub Pages</span>
    </div>
  </footer>
</body>
</html>
