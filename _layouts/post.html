---
layout: default
---
<div class="container">
  <article class="post-article">
    <header class="post-header">
      <a href="{{ '/blog' | relative_url }}" class="back-link">← Writing</a>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
    </header>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
