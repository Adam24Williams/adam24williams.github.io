---
layout: default
---
<div class="container">
  <article class="post-article">
    <header class="post-header">
      <a href="{{ '/blog' | relative_url }}" class="back-link">← Back to writing</a>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">{{ page.date | date: "%B %-d, %Y" }}</p>
      {% if page.tags.size > 0 %}
      <div class="post-tags">
        {% for tag in page.tags %}<a href="{{ '/tags/' | relative_url }}#{{ tag | slugify }}" class="post-tag{% if tag == 'featured' %} is-featured{% endif %}">{{ tag }}</a>{% endfor %}
      </div>
      {% endif %}
    </header>
    <div class="post-content">
      {{ content }}
    </div>
  </article>
</div>
